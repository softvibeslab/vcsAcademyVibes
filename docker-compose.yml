services:
  vcsavibes:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://vcsa-production-backend:8000
    container_name: vcsavibes-frontend
    restart: unless-stopped
    ports:
      - "3003:80"
    networks:
      - vcsa-production_vcsa-network
      - traefik_network
    labels:
      # Traefik configuration
      - "traefik.enable=true"
      - "traefik.http.routers.vcsavibes.rule=Host(`vcsavibes.softvibeslab.com`) || Host(`vibes.vcsa.softvibeslab.com`)"
      - "traefik.http.routers.vcsavibes.entrypoints=web"
      - "traefik.http.routers.vcsavibes.tls=true"
      - "traefik.http.routers.vcsavibes.tls.certresolver=letsencrypt"
      - "traefik.http.services.vcsavibes.loadbalancer.server.port=80"
      - "traefik.http.routers.vcsavibes-https.rule=Host(`vcsavibes.softvibeslab.com`) || Host(`vibes.vcsa.softvibeslab.com`)"
      - "traefik.http.routers.vcsavibes-https.entrypoints=websecure"
      - "traefik.http.routers.vcsavibes-https.tls=true"
      - "traefik.http.routers.vcsavibes-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.vcsavibes-https.service=vcsavibes"
      - "traefik.http.services.vcsavibes.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      - NODE_ENV=production

networks:
  vcsa-production_vcsa-network:
    external: true
  traefik_network:
    name: traefik_network
    external: true
